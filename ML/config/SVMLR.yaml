# 数据路径
IRIS_DATA_PATH: "D:/wh/AAAproject/Algorithm/Data/irisdata/iris.csv"
#IRIS_DATA_PATH: "D:/wh/AAAproject/Algorithm/Data/个贷违约/train_internet.csv"
#IRIS_DATA_PATH: "D:/wh/AAAproject/Algorithm/Data/Breast/BreastTissue.csv"
# 特征/标签列名
IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
#IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width']
#IRIS_FEATURE_COLS: ['I0', 'PA500', 'HFS', 'DA', 'Area', 'A/DA', 'Max IP', 'DR', 'P']
##IRIS_FEATURE_COLS: ['CRIM', 'ZN', 'INDUS', 'CHAS', 'NOX', 'RM', 'AGE', 'DIS', 'RAD', 'TAX', 'PTRATIO', 'B', 'LSTAT']
IRIS_LABEL_COL: "species"
#IRIS_LABEL_COL: "MEDV"
#IRIS_LABEL_COL: "Class"
# 数据集划分参数
TEST_SIZE: 0.15
VAL_SIZE: 0.15
USE_STRATIFIED: true
RANDOM_SEED: 42

# SVM模型参数
KERNEL: "rbf"  # 核函数：linear/rbf/poly/sigmoid
C: 1.0            # 惩罚系数
PROBABILITY: true # 启用概率预测（用于AUC计算）
DEGREE: 4  #多项式阶数
GAMMA: "scale" #核函数系数
MAX_ITER: max_iter #迭代次数上限
