# 数据路径
IRIS_DATA_PATH: "D:/wh/AAAproject/Algorithm/Data/irisdata/iris.csv"
#IRIS_DATA_PATH: "D:/wh/AAAproject/Algorithm/Data/fangjia/boston_house_prices1.csv"

# 特征/标签列名
IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
#IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width']
#IRIS_FEATURE_COLS: ['CRIM', 'ZN', 'INDUS', 'CHAS', 'NOX', 'RM', 'AGE', 'DIS', 'RAD', 'TAX', 'PTRATIO', 'B', 'LSTAT']
IRIS_LABEL_COL: "species"
#IRIS_LABEL_COL: "MEDV"

# 数据集划分参数
TEST_SIZE: 0.15
VAL_SIZE: 0.15
USE_STRATIFIED: true
RANDOM_SEED: 42

# 神经网络模型参数
HIDDEN_LAYERS: [64, 32]  # 隐藏层神经元数量，可根据需求调整
DROPOUT_RATE: 0.2        # Dropout率，防止过拟合
LEARNING_RATE: 0.001     # 学习率
EPOCHS: 20               # 训练轮数
BATCH_SIZE: 16           # 批次大小