# 数据路径
IRIS_DATA_PATH: "D:/wh/AAAproject/Algorithm/Data/irisdata/iris.csv"
# 数据集划分参数
TEST_SIZE:  0.15
VAL_SIZE: 0.15
RANDOM_SEED:  42
USE_STRATIFIED: True  # 分层采样保证类别分布

# 特征/标签列名
IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width']
#IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
IRIS_LABEL_COL: "species"
#模型参数
N_NEIGHBORS: 5 #邻居数量
WEIGHTS: "uniform" #邻居权重，unifrom(所有邻居的权重相同)、distance(权重与距离成反比)
ALGORITHM: "auto"  #计算最近邻的算法，auto(基于数据自动选择最合适的算法)、ball_tree、kd_tree
LEAF_SIZE: 30 #传递给BallTree或KDTree的叶子大小
P: 2 #控制着距离度量的幂指数
METRIC: "minkowski" #距离的度量标准。默认minkowski距离，当p=1时，它等同于曼哈顿距离。当p=2时，它等同于欧式距离。
METRIC_PARAMS: null #距离度量其他附属参数
