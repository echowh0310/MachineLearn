# 数据路径
IRIS_DATA_PATH: "D:/wh/AAAproject/Algorithm/Data/irisdata/iris.csv"
# 特征/标签列名
IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width', 'petal_length', 'petal_width']
#IRIS_FEATURE_COLS: ['sepal_length', 'sepal_width']
IRIS_LABEL_COL: "species"

# 数据集划分参数
TEST_SIZE: 0.15
VAL_SIZE: 0.15
USE_STRATIFIED: True
RANDOM_SEED: 42

# SVM模型参数
KERNEL: "linear"  # 核函数：linear/rbf/poly/sigmoid
C: 1.0            # 惩罚系数
PROBABILITY: True # 启用概率预测（用于AUC计算）
CLASS_WEIGHT: ~   # 类别权重（~表示None，也可设为balanced或自定义字典）